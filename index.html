<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наша Свадебная Галерея</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #fff5f8; color: #4a4a4a; margin: 0; padding: 20px; }
        h1 { color: #d63384; margin-bottom: 10px; }
        .controls { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: inline-block; margin-bottom: 30px; }
        #fileInput { margin-right: 10px; }
        button { background: #d63384; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #b82a6e; }
        button:disabled { background: #ccc; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s; }
        img:hover { transform: scale(1.03); }
    </style>
</head>
<body>

    <h1>Свадебная Галерея 💍</h1>
    <p>Загрузите ваши фотографии, чтобы сохранить их в нашей истории</p>

    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="uploadImage()" id="uploadBtn">Загрузить фото</button>
    </div>

    <div id="gallery"></div>

    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>

    <script>
        // Твои настройки Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBkQWaNGF7MISkpUrb67oetzF4O5BYjONQ",
            authDomain: "wedding-gallery02.firebaseapp.com",
            projectId: "wedding-gallery02",
            storageBucket: "wedding-gallery02.firebasestorage.app",
            appId: "1:476761207207:web:ed0a691a3006c8d2780682"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Твой ключ ImgBB
        const IMGBB_API_KEY = '26ad743452abb79302957893e27a8817';

        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('uploadBtn');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Пожалуйста, выберите файл');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Загрузка...';

            try {
                // 1. Отправляем файл на ImgBB
                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();

                if (result.success) {
                    const imageUrl = result.data.url;

                    // 2. Записываем ссылку в Firestore в коллекцию 'photos'
                    await db.collection('photos').add({
                        url: imageUrl,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    alert('Фото успешно загружено!');
                    fileInput.value = '';
                } else {
                    alert('Ошибка ImgBB: ' + result.error.message);
                }
            } catch (error) {
                console.error("Ошибка:", error);
                alert('Не удалось загрузить фото');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Загрузить фото';
            }
        }

        // Функция для отображения фотографий
        function loadPhotos() {
            // Слушаем изменения в коллекции 'photos' в реальном времени
            db.collection('photos').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.url) {
                        const img = document.createElement('img');
                        img.src = data.url;
                        img.loading = "lazy";
                        gallery.appendChild(img);
                    }
                });
            });
        }

        // Запускаем отображение при загрузке страницы
        loadPhotos();
    </script>
</body>
</html>
