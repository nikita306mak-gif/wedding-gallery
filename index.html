<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasia & Nikita | Свадебная Галерея</title>
    <style>
        /* ПОЛНОСТЬЮ СКОПИРОВАННЫЙ СТИЛЬ */
        :root { --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; --main-color: #333; --accent-color: #2c3e50; --heart-color: #e74c3c; --bg-color: #f7f7f7; --card-bg: #ffffff; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--main-color); margin: 0; padding: 0; padding-bottom: 100px; }
        
        header { padding: 60px 20px 40px; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 24px; margin: 0; }
        p.subtitle { font-size: 14px; opacity: 0.7; margin-top: 10px; }
        
        /* ГАЛЕРЕЯ-СЕТКА */
        #gallery { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; padding: 20px; }
        
        /* КАРТОЧКА ФОТО (СКОПИРОВАНА) */
        .photo-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s; position: relative; }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; height: 400px; object-fit: cover; }
        
        /* ИМЯ ЗАГРУЗИВШЕГО НАД ФОТО */
        .photo-author { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.8); color: var(--main-color); padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .card-content { padding: 20px; text-align: left; }
        .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        .like-btn { cursor: pointer; font-size: 20px; color: #ccc; border: none; background: none; display: flex; align-items: center; gap: 8px; }
        .like-btn.active { color: var(--heart-color); }
        .like-btn span { font-weight: bold; font-size: 16px; color: var(--main-color); }
        .delete-btn { font-size: 12px; color: #aaa; cursor: pointer; border: none; background: none; visibility: hidden; } /* Скрыто по умолчанию */
        
        .comments-list { font-size: 14px; color: #555; max-height: 120px; overflow-y: auto; }
        .comment-item { margin-bottom: 8px; border-bottom: 1px solid #f7f7f7; padding-bottom: 5px; }
        .comment-item strong { color: var(--accent-color); font-weight: bold; margin-right: 5px; }
        
        .comment-input-group { display: flex; margin-top: 15px; }
        .comment-input { flex: 1; border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px; font-size: 13px; background: #fdfdfd; }
        .send-comment { border: none; background: var(--accent-color); color: white; padding: 0 15px; border-radius: 4px; margin-left: 8px; cursor: pointer; }
        
        /* ФИКСИРОВАННАЯ КНОПКА-ПЛЮС (СНИЗУ СПРАВА) */
        .floating-add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background-color: var(--accent-color); color: white; border-radius: 50%; border: none; font-size: 30px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .floating-add-btn:hover { transform: scale(1.1); background-color: #3e5a75; }
    </style>
</head>
<body>

<header>
    <h1>Anastasia & Nikita</h1>
    <p class="subtitle">Наша Свадебная Галерея | 03.04.2026</p>
</header>

<div id="gallery"></div>

<input type="file" id="fileInput" accept="image/*" style="display: none;">
<button class="floating-add-btn" onclick="document.getElementById('fileInput').click()">+</button>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkQWaNGF7MISkpUrb67oetzF4O5BYjONQ",
        authDomain: "wedding-gallery02.firebaseapp.com",
        projectId: "wedding-gallery02",
        storageBucket: "wedding-gallery02.firebasestorage.app",
        appId: "1:476761207207:web:ed0a691a3006c8d2780682"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_API_KEY = '26ad743452abb79302957893e27a8817';

    // 1. ЗАПРОС ИМЕНИ ГОСТЯ И ЗАСВЕЧИВАНИЕ КНОПОК УДАЛЕНИЯ
    let guestName = localStorage.getItem('weddingGuestName');
    while (!guestName || guestName.trim() === "") {
        guestName = prompt("Для доступа к галерее, пожалуйста, введите ваше имя:");
    }
    localStorage.setItem('weddingGuestName', guestName.trim());
    
    // Покажем кнопку удаления, только если это админ
    const isAdmin = (guestName === "Макар" || guestName === "Зая");

    // 2. ЗАГРУЗКА ПРИ ВЫБОРЕ ФАЙЛА (ВМЕСТО ДВУХ КНОПОК)
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const addBtn = document.querySelector('.floating-add-btn');
        addBtn.disabled = true; addBtn.innerText = "...";

        try {
            const formData = new FormData();
            formData.append('image', file);

            const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
            const result = await resp.json();

            if (result.success) {
                await db.collection('photos').add({
                    url: result.data.url,
                    author: guestName, // Записываем имя гостя
                    likes: 0,
                    likedBy: [], // Массив ID гостей, поставивших лайк
                    comments: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch (e) { alert("Ошибка загрузки"); }
        addBtn.disabled = false; addBtn.innerText = "+";
        e.target.value = "";
    };

    // 3. ПОКАЗ ГАЛЕРЕИ В РЕАЛЬНОМ ВРЕМЕНИ (СКОПИРОВАННЫЙ СТИЛЬ)
    function loadPhotos() {
        db.collection('photos').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <div class="photo-author">от ${data.author || 'Гость'}</div>
                    <img src="${data.url}">
                    <div class="card-content">
                        <div class="actions">
                            <button class="like-btn" onclick="addLike('${id}')">
                                ❤ <span>${data.likes || 0}</span>
                            </button>
                            <button class="delete-btn" id="del-${id}" onclick="deletePhoto('${id}')" style="${isAdmin ? 'visibility:visible' : ''}">Удалить</button>
                        </div>
                        <div class="comments-list">
                            ${(data.comments || []).map(c => `
                                <div class="comment-item">
                                    <strong>${c.author}:</strong> ${c.text}
                                </div>
                            `).join('')}
                        </div>
                        <div class="comment-input-group">
                            <input type="text" class="comment-input" id="input-${id}" placeholder="Ваше пожелание...">
                            <button class="send-comment" onclick="addComment('${id}')">➤</button>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        });
    }

    // 4. ЛОГИКА ОДИНАКОВОГО ЛАЙКА (ПОКА ПРОСТАЯ, С ПРИВЯЗКОЙ К ГОСТЮ)
    async function addLike(id) {
        const docRef = db.collection('photos').doc(id);
        const doc = await docRef.get();
        if(!doc.exists) return;
        const data = doc.data();
        await docRef.update({ likes: (data.likes || 0) + 1 });
    }

    // 5. КОММЕНТАРИЙ С ИМЕНЕМ ГОСТЯ
    async function addComment(id) {
        const input = document.getElementById(`input-${id}`);
        if (!input.value) return;
        await db.collection('photos').doc(id).update({
            comments: firebase.firestore.FieldValue.arrayUnion({
                author: guestName, // Имя того, кто пишет
                text: input.value,
                time: new Date()
            })
        });
        input.value = '';
    }

    // 6. УДАЛЕНИЕ (БЕЗ ПАРОЛЯ, ТОЛЬКО ПО ИМЕНИ ВХОДА)
    async function deletePhoto(id) {
        if (!isAdmin) return; // На всякий случай
        if (confirm("Вы точно хотите удалить эту фотографию навсегда?")) {
            await db.collection('photos').doc(id).delete();
        }
    }

    loadPhotos();
</script>
</body>
</html>
